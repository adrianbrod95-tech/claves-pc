<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claves PC Michoacán</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1b2a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header .badge {
    background: #e63946;
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: inline-block;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: 1px;
  }

  header p {
    font-size: 0.85rem;
    color: #8899aa;
    margin-top: 6px;
  }

  .search-box {
    width: 100%;
    max-width: 500px;
    position: relative;
    margin-bottom: 20px;
  }

  .search-box input {
    width: 100%;
    padding: 14px 50px 14px 18px;
    border-radius: 12px;
    border: 2px solid #1e3a5f;
    background: #112240;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 600;
    outline: none;
    transition: border 0.2s;
    letter-spacing: 1px;
  }

  .search-box input:focus {
    border-color: #e63946;
  }

  .search-box input::placeholder {
    color: #445566;
    font-weight: 400;
    font-size: 0.95rem;
    letter-spacing: 0;
  }

  .search-box .icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
    color: #445566;
  }

  /* Resultado principal */
  .result-card {
    width: 100%;
    max-width: 500px;
    background: #112240;
    border: 2px solid #1e3a5f;
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 24px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .result-card.found {
    border-color: #e63946;
    background: #16213e;
  }

  .result-card.not-found {
    border-color: #445566;
  }

  .result-inner {
    text-align: center;
  }

  .result-number {
    font-size: 3.5rem;
    font-weight: 900;
    color: #e63946;
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-meaning {
    font-size: 1.3rem;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .result-placeholder {
    color: #445566;
    font-size: 0.95rem;
  }

  .result-error {
    color: #ff6b6b;
    font-size: 0.95rem;
  }

  /* Tabla de todas las claves */
  .section-title {
    width: 100%;
    max-width: 500px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #445577;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .filter-tabs {
    width: 100%;
    max-width: 500px;
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #1e3a5f;
    background: transparent;
    color: #8899aa;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .tab.active, .tab:hover {
    background: #e63946;
    border-color: #e63946;
    color: white;
  }

  .claves-grid {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 420px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .claves-grid::-webkit-scrollbar { width: 4px; }
  .claves-grid::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 4px; }

  .clave-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #112240;
    border: 1.5px solid #1a2f4a;
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .clave-row:hover, .clave-row.highlight {
    border-color: #e63946;
    background: #16213e;
  }

  .clave-num {
    font-size: 1.1rem;
    font-weight: 900;
    color: #e63946;
    min-width: 36px;
    text-align: right;
  }

  .clave-text {
    font-size: 0.88rem;
    color: #ccd6f6;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <div class="badge">Protección Civil</div>
  <h1>Claves PC Michoacán</h1>
  <p>Escribe un número de clave para consultar su significado</p>
</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Ej: 77, 14, 65..." autofocus />
  <span class="icon">🔍</span>
</div>

<div class="result-card" id="resultCard">
  <div class="result-inner">
    <p class="result-placeholder">Ingresa una clave arriba...</p>
  </div>
</div>

<div class="section-title">Todas las claves</div>

<div class="filter-tabs" id="filterTabs">
  <button class="tab active" onclick="filterRange('all', this)">Todas</button>
  <button class="tab" onclick="filterRange('1-50', this)">01–50</button>
  <button class="tab" onclick="filterRange('51-99', this)">51–99</button>
  <button class="tab" onclick="filterRange('100-120', this)">100–120</button>
</div>

<div class="claves-grid" id="clavesGrid"></div>

<script>
const CLAVES = [
  [1,"FALSA ALARMA"],[2,"RETIRESE DEL LUGAR"],[3,"ACTIVE CON CIRCULACION"],
  [4,"RELEVO"],[5,"PELOTERO"],[6,"PERIODISTA"],[7,"ALERTA GENERAL"],
  [8,"REPITA MENSAJE"],[9,"DEJE CANAL LIBRE"],[10,"TELEFONO"],
  [11,"SEAN BREVE EN REPORTE"],[12,"TRASLADO DE"],[13,"RINDA NOVEDADES"],
  [14,"SIN NOVEDAD"],[15,"AFIRMATIVO"],[16,"NEGATIVO"],
  [17,"ACTIVE CIRCULACION"],[18,"SEMAFORO - MAL ESTADO"],[19,"UTILICE SIRENA"],
  [20,"UTILICE TORRETA"],[21,"INICIO DE RECORRIDO"],[22,"MARCHA / MITIN"],
  [23,"ESTUDIANTE"],[24,"PINTAS / PROPAGANDAS"],[25,"LIBRAMIENTO"],
  [26,"BANCOS"],[27,"PLAZA DE TOROS"],[28,"ESTADIO"],[29,"AEROPUERTO"],
  [30,"ESTACION DE FERROCARIL"],[31,"CENTRAL CAMIONERA"],[32,"SECRETARIA"],
  [33,"W.C."],[34,"CORRECTIVO"],[35,"HORA EXACTA"],[36,"AUXILIO"],
  [37,"TRASLADESE"],[38,"ALIMENTOS"],[39,"DOMICILIO"],[40,"UBICACIÓN"],
  [41,"VIOLACION"],[42,"PENDIENTE"],[43,"ENTERADO"],[44,"ADELANTE"],
  [45,"CONFIDENCIAL"],[46,"UTILICE CRITERIO"],[47,"SERVICIO SOCIAL"],
  [48,"DISPOSITIVO DE TRASLADO"],[49,"ORDEN SUPERIOR"],[50,"HOMOSEXUAL"],
  [51,"FALTA A LA MORAL"],[52,"MENOR"],[53,"MUJER DE LA VIDA GALANTE"],
  [54,"MUJER"],[55,"HOMBRE"],[56,"CRISTALAZO"],[57,"DETENIDO"],
  [58,"AGRESIVO"],[59,"DENLE FACULTADES"],[60,"DARSE A LA FUGA"],
  [62,"BORRACHO"],[62,"SOSPECHOSO"],[63,"DROGADICTO"],[64,"DEMENTE / EXTRAVIADO"],
  [65,"MUERTO"],[66,"HERIDO"],[67,"ARMA DE FUEGO"],[68,"ARMA BLANCA"],
  [69,"ISSSTE"],[70,"IMSS"],[71,"INUNDACIONES"],[72,"EXPLOSION"],
  [73,"FUGAS DE GAS"],[74,"INCENDIO"],[75,"VEHICULO ABANDONADO"],
  [76,"VOLCADURA"],[77,"CHOQUE"],[78,"ATROPELLADO"],[79,"CHOFER"],
  [80,"BLOQUEO DE CALLES"],[81,"CIERRE DE CIRCULACION"],[82,"CONGESTION VEHICULAR"],
  [83,"INFRACCION"],[84,"FALLA MECANICA"],[85,"GASOLINA"],[86,"ESTACIONADO"],
  [87,"VEHICULO"],[88,"MOTOCICLETA"],[89,"MECANICO"],[90,"MILITAR"],
  [91,"MINISTERIO PÚBLICO"],[92,"MEDICO"],[93,"ELEM. DE GOBIERNO"],
  [94,"P.F.P."],[95,"POL. JUD. FED."],[96,"POL. MINISTERIAL"],[97,"BOMBEROS"],
  [98,"PERITO DE TRANSITO"],[99,"OFICIAL DE TRANSITO"],[100,"POL. MINISTERIAL"],
  [101,"POL. DE LA GOB."],[102,"POL. AUXILIAR"],[103,"GRUA DE DSP"],
  [104,"AMBU. DE CRUZ ROJA"],[105,"AMBU. DE RESCATE"],[106,"ESCUELA"],
  [107,"BANDILLA"],[108,"INCORPORESE A LA BASE"],[109,"ASALTO O ROBO"],
  [110,"CHECAR ANTECEDENTES"],[111,"CON ANTECEDENTES"],[112,"SIN ANTECEDENTES"],
  [113,"PLACA DE AUTOMOVIL"],[114,"COLOR DE"],[115,"INTERCEPTALO"],
  [116,"REQUERIMIENTO"],[117,"DEPTO. JURIDICO"],[118,"DEPTO. ACCION SOCIAL"],
  [119,"HABLE SIN CLAVES"],[120,"PATRULLA DE SEG. PUBLICA"]
];

let currentRange = 'all';

function filterRange(range, btn) {
  currentRange = range;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList(highlight = null) {
  const grid = document.getElementById('clavesGrid');
  let filtered = CLAVES;
  if (currentRange === '1-50') filtered = CLAVES.filter(c => c[0] >= 1 && c[0] <= 50);
  else if (currentRange === '51-99') filtered = CLAVES.filter(c => c[0] >= 51 && c[0] <= 99);
  else if (currentRange === '100-120') filtered = CLAVES.filter(c => c[0] >= 100 && c[0] <= 120);

  grid.innerHTML = filtered.map(([num, txt]) => `
    <div class="clave-row ${highlight == num ? 'highlight' : ''}" onclick="selectClave(${num})">
      <span class="clave-num">${String(num).padStart(2,'0')}</span>
      <span class="clave-text">${txt}</span>
    </div>
  `).join('');

  if (highlight !== null) {
    setTimeout(() => {
      const highlighted = grid.querySelector('.highlight');
      if (highlighted) highlighted.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

function selectClave(num) {
  document.getElementById('searchInput').value = num;
  showResult(num);
}

function showResult(val) {
  const card = document.getElementById('resultCard');
  const num = parseInt(val);
  if (!val.trim()) {
    card.className = 'result-card';
    card.innerHTML = `<div class="result-inner"><p class="result-placeholder">Ingresa una clave arriba...</p></div>`;
    renderList();
    return;
  }
  const found = CLAVES.find(c => c[0] === num);
  if (found) {
    card.className = 'result-card found';
    card.innerHTML = `
      <div class="result-inner">
        <div class="result-number">${String(found[0]).padStart(2,'0')}</div>
        <div class="result-meaning">${found[1]}</div>
      </div>`;
    renderList(num);
  } else {
    card.className = 'result-card not-found';
    card.innerHTML = `<div class="result-inner"><p class="result-error">Clave <strong>${num}</strong> no encontrada</p></div>`;
    renderList();
  }
}

document.getElementById('searchInput').addEventListener('input', function() {
  showResult(this.value);
});

renderList();
</script>
</body>
</html>
