<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e63946">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Claves PC">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Claves PC Michoacán</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1b2a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    gap: 18px;
  }

  header { text-align: center; }

  .badge {
    background: #e63946;
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 14px;
    border-radius: 20px;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 8px;
  }

  h1 { font-size: 1.6rem; font-weight: 800; color: #fff; }

  .ventanas {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .ventana {
    background: #112240;
    border: 2px solid #1e3a5f;
    border-radius: 18px;
    padding: 18px 22px;
    transition: border-color 0.2s, background 0.2s;
  }

  .ventana.activa { border-color: #e63946; background: #0f1e35; }

  .ventana label {
    display: block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #4a6080;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .ventana input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-size: 2.4rem;
    font-weight: 900;
    color: #e63946;
    letter-spacing: 3px;
    text-align: center;
    caret-color: #e63946;
  }

  .ventana input.texto {
    font-size: 1.6rem;
    letter-spacing: 1px;
    color: #ffffff;
  }

  .ventana input::placeholder { color: #1e3a5f; font-size: 1.4rem; letter-spacing: 1px; }

  .resultado-box {
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .res-placeholder { font-size: 0.95rem; color: #2a4a6a; text-align: center; }
  .res-error { font-size: 0.95rem; color: #ff6b6b; text-align: center; }

  .res-numero {
    font-size: 3rem;
    font-weight: 900;
    color: #e63946;
    line-height: 1;
  }

  .res-sig {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
  }

  .multi-resultado {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: aparecer 0.2s ease;
  }

  .multi-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #0d1b2a;
    border: 1.5px solid #1a2f4a;
    border-radius: 10px;
    padding: 10px 14px;
  }

  .multi-num {
    font-size: 1.4rem;
    font-weight: 900;
    color: #e63946;
    min-width: 40px;
    text-align: right;
  }

  .multi-sig {
    font-size: 0.9rem;
    color: #ccd6f6;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .flecha {
    text-align: center;
    color: #1e3a5f;
    font-size: 1.4rem;
    line-height: 1;
    margin: -4px 0;
  }

  .ventana-lista {
    width: 100%;
    max-width: 460px;
    background: #112240;
    border: 2px solid #1e3a5f;
    border-radius: 18px;
    padding: 20px 22px;
  }

  .ventana-lista label {
    display: block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #4a6080;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .lista-tabla { width: 100%; border-collapse: collapse; }
  .lista-tabla tr { border-bottom: 1px solid #1a2f4a; }
  .lista-tabla tr:last-child { border-bottom: none; }
  .lista-tabla tr.resaltada { background: #1a2f4a; }
  .lista-tabla td { padding: 9px 6px; font-size: 0.88rem; }

  .td-num {
    color: #e63946;
    font-weight: 900;
    font-size: 1rem;
    width: 48px;
    text-align: right;
    padding-right: 16px;
  }

  .td-sig { color: #ccd6f6; font-weight: 500; }
</style>
</head>
<body>

<header>
  <div class="badge">Protección Civil Michoacán</div>
  <h1>Decodificador de Claves</h1>
</header>

<div class="ventanas">
  <div class="ventana" id="vNum">
    <label>🔢 Número de clave</label>
    <input id="inputNum" type="number" min="1" max="120" placeholder="Ej: 77" />
  </div>

  <div class="flecha">⇅</div>

  <div class="ventana" id="vTxt">
    <label>🔤 Palabra o significado</label>
    <input id="inputTxt" class="texto" type="text" placeholder="Ej: accidente, fuego..." />
    <div class="resultado-box" id="resultadoTxt">
      <p class="res-placeholder">Escribe una palabra para buscar...</p>
    </div>
  </div>
</div>

<div class="ventana-lista">
  <label>Lista completa de claves</label>
  <table class="lista-tabla" id="listaTabla"></table>
</div>

// Render lista
const tabla = document.getElementById('listaTabla');
tabla.innerHTML = CLAVES.map(c =>
  '<tr id="fila-'+c.n+'"><td class="td-num">'+String(c.n).padStart(2,'0')+'</td><td class="td-sig">'+c.s+'</td></tr>'
).join('');

function norm(t) {
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function resaltarFila(num) {
  document.querySelectorAll('.lista-tabla tr').forEach(r => r.classList.remove('resaltada'));
  const fila = document.getElementById('fila-'+num);
  if (fila) { fila.classList.add('resaltada'); fila.scrollIntoView({ behavior:'smooth', block:'center' }); }
}

const inputNum = document.getElementById('inputNum');
const inputTxt = document.getElementById('inputTxt');
const resultadoTxt = document.getElementById('resultadoTxt');
const vNum = document.getElementById('vNum');
const vTxt = document.getElementById('vTxt');

inputNum.addEventListener('input', function() {
  const num = parseInt(this.value);
  const found = CLAVES.find(c => c.n === num);
  if (!this.value.trim()) {
    vNum.classList.remove('activa'); vTxt.classList.remove('activa');
    inputTxt.value = '';
    resultadoTxt.innerHTML = '<p class="res-placeholder">Escribe una palabra para buscar...</p>';
    document.querySelectorAll('.lista-tabla tr').forEach(r => r.classList.remove('resaltada'));
    return;
  }
  if (found) {
    vNum.classList.add('activa'); vTxt.classList.add('activa');
    inputTxt.value = '';
    resultadoTxt.innerHTML = '<div class="res-sig" style="font-size:1.6rem;animation:aparecer .2s ease">'+found.s+'</div>';
    resaltarFila(found.n);
  } else {
    vNum.classList.remove('activa'); vTxt.classList.remove('activa');
    inputTxt.value = '';
    resultadoTxt.innerHTML = '<p class="res-error">Clave <strong>'+this.value+'</strong> no encontrada</p>';
    document.querySelectorAll('.lista-tabla tr').forEach(r => r.classList.remove('resaltada'));
  }
});

inputTxt.addEventListener('input', function() {
  const q = norm(this.value.trim());
  if (!q) {
    vTxt.classList.remove('activa'); vNum.classList.remove('activa');
    inputNum.value = '';
    resultadoTxt.innerHTML = '<p class="res-placeholder">Escribe una palabra para buscar...</p>';
    document.querySelectorAll('.lista-tabla tr').forEach(r => r.classList.remove('resaltada'));
    return;
  }
  const resultados = CLAVES.filter(c =>
    norm(c.s).includes(q) || c.sin.some(s => norm(s).includes(q))
  );
  document.querySelectorAll('.lista-tabla tr').forEach(r => r.classList.remove('resaltada'));
  if (resultados.length === 0) {
    vTxt.classList.remove('activa'); vNum.classList.remove('activa');
    inputNum.value = '';
    resultadoTxt.innerHTML = '<p class="res-error">Sin resultados para "<strong>'+this.value+'</strong>"</p>';
    return;
  }
  vTxt.classList.add('activa'); vNum.classList.add('activa');
  if (resultados.length === 1) {
    inputNum.value = resultados[0].n;
    resultadoTxt.innerHTML =
      '<div class="res-numero">'+String(resultados[0].n).padStart(2,'0')+'</div>'+
      '<div class="res-sig">'+resultados[0].s+'</div>';
    resaltarFila(resultados[0].n);
  } else {
    inputNum.value = '';
    resultadoTxt.innerHTML =
      '<div class="multi-resultado">'+
      resultados.map(c =>
        '<div class="multi-item">'+
        '<span class="multi-num">'+String(c.n).padStart(2,'0')+'</span>'+
        '<span class="multi-sig">'+c.s+'</span>'+
        '</div>'
      ).join('')+'</div>';
    resultados.forEach(c => {
      const f = document.getElementById('fila-'+c.n);
      if (f) f.classList.add('resaltada');
    });
  }
});

// Registrar Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
